<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 1</title>
    <link rel="stylesheet" href="Practice 2.1ad.css" />
  </head>
  <body>
    <h3>Get in touch with us by filling contact form below</h3>
    <div class="login">
      <div class="fullname">
        <form>
          <input
            type="text"
            id="fullname"
            placeholder="*Enter your full name"
            style="width: 300px; height: 40px"
          />
        </form>
      </div>
      <div class="email">
        <form>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="*Enter your email address"
            style="width: 300px; height: 40px"
          />
        </form>
      </div>
    </div>
    <div class="subject">
      <form>
        <input
          type="text"
          id="subject"
          placeholder="Enter your subject"
          style="width: 800px; height: 40px"
        />
      </form>
    </div>
    <div class="message">
      <form>
        <textarea
          name="message"
          id=""
          cols="100"
          rows="10"
          placeholder="*Your message here..."
        ></textarea>
      </form>
    </div>
    <div class="footer-form">
      <a href="#" class="button">Send Message</a>

      <div class="message">
        <span>*Please fill all required form field, thanks!</span>
      </div>
    </div>
  </body>
</html>
