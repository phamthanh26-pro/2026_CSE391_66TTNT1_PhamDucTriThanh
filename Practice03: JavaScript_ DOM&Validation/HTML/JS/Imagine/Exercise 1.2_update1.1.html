<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Grade Manager - Advanced</title>
  </head>
  <body>
    <div class="container">
      <h1>STUDENT GRADE MANAGER - ADVANCED</h1>

      <div class="form-group">
        <div>
          <label>Name:</label>
          <input type="text" id="name" placeholder="Enter name" />
        </div>
        <div>
          <label>Score (0-10):</label>
          <input
            type="number"
            id="score"
            step="0.1"
            placeholder="Enter score"
          />
        </div>
        <button id="addBtn">ADD</button>
      </div>

      <div class="filter-section">
        <div>
          <label>Search:</label>
          <input type="text" id="search" placeholder="Search by name..." />
        </div>
        <div>
          <label>Filter by grade:</label>
          <select id="gradeFilter">
            <option value="all">All</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Average">Average</option>
            <option value="Poor">Poor</option>
          </select>
        </div>
      </div>

      <table border="1">
        <thead>
          <tr>
            <th>No</th>
            <th>Name</th>
            <th id="sortBtn">Score <span id="sortIcon">↕️</span></th>
            <th>Grade</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>

      <div id="noResultMsg" class="no-result">No students found</div>

      <div class="stats">
        <p>Total: <span id="total">0</span></p>
        <p>Average: <span id="avg">0.00</span></p>
        <p>
          Showing: <span id="show">0</span> / <span id="totalCount">0</span>
        </p>
      </div>
    </div>

    <script src="script1.2.js"></script>
  </body>
</html>
